---
# tasks/collect_group_keys.yml
# Finds .pub files for a group (item) and stores their contents in a group-specific fact.

- name: Find public key files for group "{{ item }}"
  ansible.builtin.find:
    paths: "{{ ssh_repo_dest }}/groups/{{ item }}"
    patterns: "*.pub"
    file_type: file
  register: group_keyfiles
  when: item is defined

- name: Read public key contents for group "{{ item }}"
  ansible.builtin.slurp:
    src: "{{ file_path }}"
  register: key_content
  loop: "{{ group_keyfiles.files | map(attribute='path') | list }}"
  loop_control:
    loop_var: file_path
  when: group_keyfiles is defined and (group_keyfiles.files | length) > 0

- name: Store collected keys for group "{{ item }}"
  ansible.builtin.set_fact:
    "keys_for_group_{{ item | replace('-', '_') }}": "{{ query('sequence', 'start=0 end=' + ((key_content.results | length) - 1) | string) | map('extract', key_content.results, ['content']) | list }}"
  when: group_keyfiles is defined and (group_keyfiles.files | length) > 0
