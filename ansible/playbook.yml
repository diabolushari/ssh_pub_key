---
# ansible/playbook.yml
# Centralized SSH key sync playbook with dynamic inventory and group-based access

- name: Synchronize SSH keys from repository
  hosts: servers
  become: true
  vars:
    # URL of the repository (should contain servers.yml, groups.yml, access-mapping.yml, and groups/ directories)
    ssh_repo_url: 'https://github.com/diabolusHari/ssh_pub_key.git'
    ssh_repo_dest: '/tmp/ssh_keys_repo'

  tasks:
    - name: Clone/update SSH key repository on target host
      ansible.builtin.git:
        repo: "{{ ssh_repo_url }}"
        dest: "{{ ssh_repo_dest }}"
        version: main
        update: yes
      register: git_result
      changed_when: git_result.changed

    - name: Load servers configuration
      ansible.builtin.slurp:
        src: "{{ ssh_repo_dest }}/servers.yml"
      register: servers_file

    - name: Load groups configuration
      ansible.builtin.slurp:
        src: "{{ ssh_repo_dest }}/groups.yml"
      register: groups_file

    - name: Load access mapping configuration
      ansible.builtin.slurp:
        src: "{{ ssh_repo_dest }}/access-mapping.yml"
      register: access_mapping_file

    - name: Parse configuration files
      ansible.builtin.set_fact:
        servers_config: "{{ servers_file.content | b64decode | from_yaml }}"
        groups_config: "{{ groups_file.content | b64decode | from_yaml }}"
        access_mapping_config: "{{ access_mapping_file.content | b64decode | from_yaml }}"

    - name: Determine which groups apply to this server
      ansible.builtin.set_fact:
        applicable_groups: "{{ applicable_groups | default([]) + [item.key] }}"
      loop: "{{ access_mapping_config.access_mapping | dict2items }}"
      when: inventory_hostname in item.value.servers

    - name: Collect Linux users from applicable groups
      ansible.builtin.set_fact:
        target_linux_users: "{{ target_linux_users | default([]) + item_users }}"
      vars:
        item_users: "{{ groups_config.groups[item].linux_users }}"
      loop: "{{ applicable_groups }}"

    - name: Remove duplicates from target users list
      ansible.builtin.set_fact:
        target_linux_users: "{{ target_linux_users | unique }}"

    - name: Collect SSH keys for each applicable group
      ansible.builtin.include_tasks: tasks/collect_group_keys.yml
      loop: "{{ applicable_groups }}"
      loop_control:
        loop_var: item

    - name: Build merged key list for each Linux user
      ansible.builtin.set_fact:
        keys_by_user: "{{ keys_by_user | default({}) | combine({item: merged_keys}) }}"
      vars:
        merged_keys: >
          {%- set keys = [] -%}
          {%- for group in applicable_groups -%}
            {%- set group_keys_var = 'keys_for_group_' + group | replace('-', '_') -%}
            {%- if vars.get(group_keys_var) -%}
              {%- set _ = keys.extend(vars[group_keys_var]) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ keys | unique }}
      loop: "{{ target_linux_users }}"

    - name: Deploy SSH keys and authorized_keys for each user
      ansible.builtin.include_tasks: tasks/deploy_user_keys.yml
      loop: "{{ target_linux_users }}"
      loop_control:
        loop_var: item

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: "Keys deployed for server {{ inventory_hostname }}: groups={{ applicable_groups }}, users={{ target_linux_users }}"

